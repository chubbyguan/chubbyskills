name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  reliability:
    name: Reliability checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: |
          find . -name "*.py" -type f -not -path "./.git/*" -print0 \
            | xargs -0 python -m py_compile

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate example outputs
        run: |
          python tools/validate_outputs.py examples/outputs
          python tools/validate_outputs.py examples/outputs --schema-v1
          python tools/platform_health.py --check
          python tools/platform_health.py --check-output
          python tools/vault_index.py --db /tmp/chubby-vault-index.sqlite index examples/outputs
          python tools/vault_index.py --db /tmp/chubby-vault-index.sqlite search 样例 --limit 2
          python tools/vault_index.py --db /tmp/chubby-vault-index.sqlite stats
          rm -f /tmp/chubby-vault-index.sqlite

      - name: CLI smoke tests
        run: |
          python tools/check_env.py
          python tools/chubby.py --help
          python tools/chubby.py ingest --help
          python tools/chubby.py run --help
          python tools/chubby.py status --help
          python tools/chubby.py retry --help
          python tools/chubby.py quickstart --ephemeral --no-state
          python tools/chubby_ingest.py --help
          python tools/platform_health.py --help
          python tools/vault_index.py --help
          python tools/validate_outputs.py --help
          python industry-intelligence-radar/scripts/scan.py --help
          python knowledge-base-management/scripts/vault_health_check.py --help

      - name: Lint
        run: |
          python -m pip install ruff
          ruff check . --select E,F,W --ignore E501
